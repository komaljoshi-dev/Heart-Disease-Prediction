{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block body_class %}register-page-background{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 100px);"> {# Adjust min-height as needed #}
    <div class="row w-100 no-gutters">
        <div class="col-md-7 d-flex flex-column justify-content-center align-items-center">
            <!-- Left half: Background image shows through -->
        </div>
        <div class="col-md-5 d-flex flex-column justify-content-center align-items-center">
            <div class="register-form-container p-4">
                <h2>Register</h2>
                <form method="POST">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Choose a unique username" required>
                    </div>
                    <div class="form-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create a strong password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Register</button>
                </form>
                <p class="mt-3">Already have an account? <a href="{{ url_for('main.login') }}" class="text-red-accent">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
